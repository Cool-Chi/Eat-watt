<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eat_watt 呷啥？幫你選晚餐</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="theme-color" id="themeColorMeta" content="#F2F2F7">
    
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/list.css">
    <link rel="stylesheet" href="css/games.css">
    
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
</head>
<body>
    <div class="header">
        <h1 class="page-title">🍽️ 晚餐吃什麼？</h1>
        <div class="theme-switch-wrapper">
            <label class="theme-switch" for="themeCheckbox">
                <input type="checkbox" id="themeCheckbox" />
                <div class="slider">
                    <div class="stars-and-hills">
                        <div class="star star1"></div><div class="star star2"></div>
                        <div class="star star3"></div><div class="star star4"></div><div class="hill"></div>
                    </div>
                    <div class="clouds">
                        <div class="cloud cloud-main"></div><div class="cloud cloud-small-1"></div><div class="cloud cloud-small-2"></div>
                    </div>
                    <div class="thumb">
                        <div class="crater crater1"></div><div class="crater crater2"></div><div class="crater crater3"></div>
                    </div>
                </div>
            </label>
            <div class="theme-text" id="modeText">Light mode</div>
        </div>
    </div>

    <div class="container">
        <div class="card sidebar">
            <h2>🍜 晚餐名單</h2>
            
            <div class="input-section">
                <input type="text" id="foodInput" placeholder="輸入想吃的食物...">
                <div class="budget-selector" id="addBudgetSelector" data-active="$$">
                    <div class="budget-slider-indicator"></div>
                    <button class="budget-btn" data-val="$">$</button>
                    <button class="budget-btn" data-val="$$">$$</button>
                    <button class="budget-btn" data-val="$$$">$$$</button>
                </div>
                <div class="input-actions">
                    <button id="importBtn" class="folder-btn" onclick="openImportModal()" title="匯入資料">📥</button>
                    <button id="exportBtn" class="folder-btn" onclick="openExportModal()" title="匯出資料">📤</button>
                    <button id="addBtn" class="add-btn" onclick="addFood()">新增食物</button>
                    <button id="addFolderBtn" class="folder-btn" onclick="addFolder()" title="新增資料夾">📁</button>
                </div>
            </div>

            <ul class="food-list" id="foodList"></ul>
        </div>

        <div class="card main-panel">
            <h2>幫我決定吃什麼</h2>
            
            <div class="methods-bar" id="methodsBar"></div>

            <div class="budget-filter-bar" id="budgetFilterBar">
                <button class="filter-tab active" data-filter="$" onclick="setFilter('$')">$ 平價</button>
                <button class="filter-tab active" data-filter="$$" onclick="setFilter('$$')">$$ 中價位</button>
                <button class="filter-tab active" data-filter="$$$" onclick="setFilter('$$$')">$$$ 奢華</button>
            </div>

            <div id="folderFilterBar" class="folder-filter-wrap"></div>
            
            <div class="preview-collapsible">
                <div class="preview-toggle" onclick="togglePreview()">
                    👀 預覽符合名單 (<span id="poolCount">0</span>) <span id="previewArrow">▾</span>
                </div>
                <div id="poolPreviewWrapper" class="pool-preview-wrapper">
                    <div id="poolPreview" class="pool-preview-container inner-preview"></div>
                </div>
            </div>

            <div class="interactive-zone" id="interactiveZone"></div>
            <button id="actionBtn" class="action-btn">點擊開始</button>
        </div>
    </div>

    <div id="dataModal" class="modal-overlay hidden">
        <div class="modal-card">
            <h3 id="modalTitle">匯出/匯入資料</h3>
            <textarea id="modalTextarea" class="modal-textarea" rows="10"></textarea>
            <div class="modal-actions" id="modalActions">
                </div>
        </div>
    </div>

    <script type="module" src="./js/main.js"></script>
</body>
</html>
